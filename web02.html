<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

li:nth-child(odd) {
    color: #2b6cb0; 
    font-weight: 500;
}


li:nth-child(even) {
    color: #dd6b20; 
    font-weight: 500;
}



li::before {
    content: "/ "; 
    color: #4a5568; 
    font-weight: bold;
    margin-right: 8px; 
}



input {
    padding: 8px 12px;
    margin-top: 5px;
    border: 2px solid #cbd5e0; 
    border-radius: 4px;
    outline: none; 
    transition: border-color 0.3s ease; 
}


input:focus {
    border-color: #3182ce; 
}



a {
    display: inline-block;
    padding: 10px 20px;
    color: #2d3748; 
    text-decoration: none; 
    transition: all 0.3s ease; 
}


a:hover {
    color: #ffffff; 
    background-color: #3182ce; 
}

.form-group {
    margin-bottom: 15px;
}
label {
    display: block;
    font-weight: bold;
}


    </style>
</head>
<body>
    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
    </nav>

    <hr>

    <h2>My Checklist</h2>
    <ul>
        <li>HTML5 Basics</li>
        <li>CSS3 Styling</li>
        <li>Selectors and Specificity</li>
        <li>Responsive Design</li>
        <li>JavaScript Essentials</li>
        <li>Git and GitHub Workflow</li>
    </ul>

    <hr>

    <h2>Register</h2>
    <form>
        <div class="form-group">
            <label for="username">Username:</label>
            <input type="text" id="username" placeholder="Enter your username">
        </div>
        
        <div class="form-group">
            <label for="password">Password:</label>
            <input type="password" id="password" placeholder="Enter your password">
        </div>
    </form>
</body>
</html>
